<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hani 3D Mágico</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/math/MeshSurfaceSampler.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h2>✨ Hani 3D</h2>
        <div id="status">⏳ Cargando...</div>
        
        <p>Elige la forma:</p>
        <div class="button-group">
            <button onclick="setShape('sphere')">Esfera</button>
            <button onclick="setShape('hani')">Hani</button>
            <button onclick="setShape('heart')">Corazón</button>
        </div>

        <div class="control">
            <label>Color:</label>
            <input type="color" id="colorPicker" value="#ff0080">
        </div>
        
        <p class="instructions">
            ✊ <strong>Cerrar mano:</strong> Formar figura<br>
            ✋ <strong>Abrir mano:</strong> Explotar
        </p>
    </div>

    <video class="input_video"></video>
    
    <canvas id="canvas3d"></canvas>

    <script src="script.js"></script>
</body>
</html>
