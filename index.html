<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hani 3D: Control Maestro</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/math/MeshSurfaceSampler.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h2>✨ Hani 3D</h2>
        <div id="status">⏳ Cargando...</div>
        
        <div style="font-size: 0.85em; color: #ddd; line-height: 1.6; margin-top: 10px;">
            <p><strong>GESTOS:</strong><br>
            ✌️ Paz = <strong>HANI</strong> <br>
            ✊ Puño = <strong>CORAZÓN</strong><br>
            🤙 Llamada = <strong>MENSAJE SORPRESA</strong></p> <p><strong>CONTROL:</strong><br>
            👌 Pellizco + Mover = <strong>ROTAR</strong><br>
            ✋ Mano Abierta = <strong>EXPLOTAR</strong></p>
        </div>

        <div class="control">
            <label>Color:</label>
            <input type="color" id="colorPicker" value="#ff0080">
        </div>
    </div>

    <video class="input_video"></video>
    <canvas id="canvas3d"></canvas>

    <script src="script.js"></script>
</body>
</html>
